<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Foro</title>
    <style>
        /* Diseño oscuro y minimalista */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #1e1e1e; 
            color: #ffffff; 
            max-width: 600px;
            margin: 0 auto;
            padding: 30px; 
        }
        h1 { text-align: center; color: #f6820c; }
        
        /* Estilos del formulario */
        .formulario {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #2c2c2c;
            color: white;
            font-size: 16px;
        }
        button { 
            padding: 12px 20px; 
            font-size: 16px; 
            background-color: #f6820c; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background-color: #df7305; }

        /* Estilos de los comentarios */
        .comentario-card {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid #f6820c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .acciones button {
            padding: 8px 12px;
            font-size: 14px;
            margin-left: 5px;
        }
        .btn-editar { background-color: #4CAF50; }
        .btn-editar:hover { background-color: #45a049; }
        .btn-borrar { background-color: #f44336; }
        .btn-borrar:hover { background-color: #da190b; }
        .fecha { font-size: 12px; color: #aaa; margin-top: 5px;}
    </style>
</head>
<body>

    <h1>Mini Foro Fenix</h1>
    
    <form class="formulario" id="form-foro">
        <input type="text" id="input-comentario" placeholder="Escribe un comentario..." required autocomplete="off">
        <button type="submit">Publicar</button>
    </form>

    <div id="lista-comentarios">
        <p style="text-align: center; color: #aaa;">Cargando comentarios...</p>
    </div>

    <script type="module">
        // 1. Importar las funciones necesarias, incluyendo borrar y actualizar
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // 2. Tu configuración
        const firebaseConfig = {
            apiKey: "AIzaSyAuVximC609FvrFWr1EjbF3o-qPtsHUbg8",
            authDomain: "fenix-97eb9.firebaseapp.com",
            projectId: "fenix-97eb9",
            storageBucket: "fenix-97eb9.firebasestorage.app",
            messagingSenderId: "342747402569",
            appId: "1:342747402569:web:7a7628f6323653c3008a98"
        };

        // 3. Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Referencias al DOM
        const formForo = document.getElementById('form-foro');
        const inputComentario = document.getElementById('input-comentario');
        const listaComentarios = document.getElementById('lista-comentarios');

        // Referencia a la colección "foro" ordenada por fecha (más recientes abajo)
        const foroRef = collection(db, "foro");
        const consultaForo = query(foroRef, orderBy("fecha", "asc"));

        // ==========================================
        // LEER (Read) - Tiempo Real
        // ==========================================
        onSnapshot(consultaForo, (snapshot) => {
            listaComentarios.innerHTML = ""; // Limpiar lista antes de actualizar
            
            if(snapshot.empty) {
                listaComentarios.innerHTML = "<p style='text-align:center; color:#aaa;'>No hay comentarios aún. ¡Sé el primero!</p>";
                return;
            }

            snapshot.forEach((documento) => {
                const data = documento.data();
                const id = documento.id; // El ID único del documento en Firestore
                
                // Construir el HTML de cada comentario
                const div = document.createElement('div');
                div.className = 'comentario-card';
                div.innerHTML = `
                    <div>
                        <div>${data.texto}</div>
                        <div class="fecha">ID: ${id}</div>
                    </div>
                    <div class="acciones">
                        <button class="btn-editar" data-id="${id}" data-texto="${data.texto}">Editar</button>
                        <button class="btn-borrar" data-id="${id}">Borrar</button>
                    </div>
                `;
                listaComentarios.prepend(div); // Prepend para que los nuevos salgan arriba
            });
        });

        // ==========================================
        // CREAR (Create)
        // ==========================================
        formForo.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evitar que la página se recargue
            const texto = inputComentario.value.trim();
            
            try {
                await addDoc(foroRef, {
                    texto: texto,
                    fecha: new Date().getTime() // Usamos un timestamp para poder ordenar
                });
                inputComentario.value = ""; // Limpiar el input
            } catch (error) {
                console.error("Error al publicar:", error);
            }
        });

        // ==========================================
        // ACTUALIZAR (Update) Y BORRAR (Delete)
        // Usamos delegación de eventos en el contenedor padre
        // ==========================================
        listaComentarios.addEventListener('click', async (e) => {
            
            // Si hacen clic en BORRAR
            if (e.target.classList.contains('btn-borrar')) {
                const idBorrar = e.target.getAttribute('data-id');
                const confirmar = confirm("¿Estás seguro de borrar este comentario?");
                if (confirmar) {
                    try {
                        // Pasamos la referencia exacta del documento a borrar
                        await deleteDoc(doc(db, "foro", idBorrar));
                    } catch (error) {
                        console.error("Error al borrar:", error);
                    }
                }
            }

            // Si hacen clic en EDITAR
            if (e.target.classList.contains('btn-editar')) {
                const idEditar = e.target.getAttribute('data-id');
                const textoActual = e.target.getAttribute('data-texto');
                
                // Pedimos el nuevo texto con un prompt sencillo
                const nuevoTexto = prompt("Edita tu comentario:", textoActual);
                
                // Si el usuario escribió algo y es diferente al actual, actualizamos
                if (nuevoTexto && nuevoTexto.trim() !== "" && nuevoTexto !== textoActual) {
                    try {
                        // Pasamos la referencia exacta del documento a actualizar
                        await updateDoc(doc(db, "foro", idEditar), {
                            texto: nuevoTexto
                        });
                    } catch (error) {
                        console.error("Error al editar:", error);
                    }
                }
            }
        });

    </script>
</body>
</html>
