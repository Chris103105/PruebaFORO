<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Foro Fenix - Acceso</title>
    <style>
        /* Mantenemos el fondo oscuro y minimalista */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1e1e1e; 
            color: #ffffff; 
            max-width: 600px;
            margin: 0 auto;
            padding: 30px; 
        }
        h1 { text-align: center; color: #f6820c; }
        
        #seccion-auth, #seccion-foro { display: none; }

        .card {
            background-color: #2c2c2c;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #1e1e1e;
            color: white;
            box-sizing: border-box;
        }

        button { 
            width: 100%;
            padding: 12px; 
            font-size: 16px; 
            background-color: #f6820c; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #df7305; }
        
        .btn-secundario { background-color: #444; margin-top: 10px; }
        .btn-secundario:hover { background-color: #555; }
        
        /* Botón de Google */
        .btn-google { 
            background-color: #ffffff; 
            color: #333; 
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover { background-color: #e0e0e0; }
        
        .divisor {
            text-align: center;
            margin: 15px 0;
            color: #aaa;
            font-size: 14px;
        }

        .btn-logout { background-color: #f44336; width: auto; padding: 5px 15px; float: right; }

        /* Estilos del Foro */
        .formulario-comentario { display: flex; gap: 10px; margin: 20px 0; }
        .comentario-card {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid #f6820c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .acciones button { width: auto; padding: 5px 10px; margin-left: 5px; font-size: 12px; }
        .btn-editar { background-color: #4CAF50; }
        .btn-borrar { background-color: #f44336; }
        .info-usuario { font-size: 14px; color: #f6820c; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 10px;}
        
        /* Mensaje para usuarios de solo lectura */
        #mensaje-lectura {
            text-align: center;
            color: #aaa;
            font-style: italic;
            margin-bottom: 20px;
            display: none; /* Oculto por defecto */
        }
    </style>
</head>
<body>

    <h1>Fenix Network</h1>

    <div id="seccion-auth" class="card">
        <h2 style="text-align: center; margin-top: 0;">Iniciar Sesión</h2>
        
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-login">Entrar con Correo</button>
        <button id="btn-registro" class="btn-secundario">Crear cuenta nueva</button>

        <div class="divisor">O ingresa rápidamente con</div>

        <button id="btn-google" class="btn-google">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Continuar con Google
        </button>
    </div>

    <div id="seccion-foro">
        <div class="info-usuario">
            Conectado como: <strong id="user-email"></strong>
            <button class="btn-logout" id="btn-cerrar-sesion">Cerrar Sesión</button>
        </div>

        <form class="formulario-comentario" id="form-foro">
            <input type="text" id="input-comentario" placeholder="Escribe un anuncio o mensaje..." required autocomplete="off">
            <button type="submit" style="width: auto;">Publicar</button>
        </form>

        <p id="mensaje-lectura">Modo de solo lectura. Únicamente el coordinador puede publicar.</p>

        <div id="lista-comentarios"></div>
    </div>

    <script type="module">
        // Importamos signInWithRedirect para evitar bloqueos en GitHub Pages
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithRedirect } 
            from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy } 
            from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuVximC609FvrFWr1EjbF3o-qPtsHUbg8",
            authDomain: "fenix-97eb9.firebaseapp.com",
            projectId: "fenix-97eb9",
            storageBucket: "fenix-97eb9.firebasestorage.app",
            messagingSenderId: "342747402569",
            appId: "1:342747402569:web:7a7628f6323653c3008a98"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        const seccionAuth = document.getElementById('seccion-auth');
        const seccionForo = document.getElementById('seccion-foro');
        const userEmailSpan = document.getElementById('user-email');
        
        const formularioForo = document.getElementById('form-foro');
        const mensajeLectura = document.getElementById('mensaje-lectura');

        // ==========================================
        // CONFIGURACIÓN DEL ROL
        // ==========================================
        // Cambia este correo por el que usarás para ser el administrador
        const CORREO_COORDINADOR = "coordinador@udb.edu.sv"; 

        // ==========================================
        // GESTIÓN DE ESTADO Y VISTAS
        // ==========================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                seccionAuth.style.display = 'none';
                seccionForo.style.display = 'block';
                userEmailSpan.textContent = user.displayName || user.email;

                // VALIDACIÓN VISUAL: ¿Es el coordinador?
                if (user.email === CORREO_COORDINADOR) {
                    formularioForo.style.display = 'flex'; // Muestra el form
                    mensajeLectura.style.display = 'none'; // Oculta el mensaje
                } else {
                    formularioForo.style.display = 'none'; // Oculta el form
                    mensajeLectura.style.display = 'block'; // Muestra el mensaje
                }

                // Le pasamos el usuario actual a la función para que decida si muestra los botones de borrar
                cargarComentarios(user);
            } else {
                seccionAuth.style.display = 'block';
                seccionForo.style.display = 'none';
            }
        });

        // LOGIN CON GOOGLE (Usando Redirect)
        document.getElementById('btn-google').addEventListener('click', () => {
            try {
                signInWithRedirect(auth, googleProvider);
            } catch (error) {
                console.error("Error de Google Auth:", error);
            }
        });

        // LOGIN CON CORREO
        document.getElementById('btn-registro').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
            } catch (error) { alert("Error: " + error.message); }
        });

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) { alert("Credenciales incorrectas"); }
        });

        document.getElementById('btn-cerrar-sesion').addEventListener('click', () => signOut(auth));

        // ==========================================
        // LÓGICA DEL FORO
        // ==========================================
        function cargarComentarios(userActual) {
            const q = query(collection(db, "foro"), orderBy("fecha", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const lista = document.getElementById('lista-comentarios');
                lista.innerHTML = "";
                
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const div = document.createElement('div');
                    div.className = 'comentario-card';
                    
                    // Solo inyectamos los botones si el que lee es el coordinador
                    let botonesHTML = "";
                    if (userActual && userActual.email === CORREO_COORDINADOR) {
                        botonesHTML = `
                            <div class="acciones">
                                <button class="btn-editar" onclick="editarComentario('${id}', '${data.texto}')">Editar</button>
                                <button class="btn-borrar" onclick="borrarComentario('${id}')">Borrar</button>
                            </div>
                        `;
                    }

                    div.innerHTML = `
                        <div>
                            <strong style="color: #f6820c;">${data.autor || 'Anónimo'}:</strong>
                            <div style="margin-top: 5px;">${data.texto}</div>
                        </div>
                        ${botonesHTML}
                    `;
                    lista.appendChild(div);
                });
            });
        }

        document.getElementById('form-foro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('input-comentario');
            try {
                await addDoc(collection(db, "foro"), {
                    texto: input.value,
                    autor: auth.currentUser.displayName || auth.currentUser.email,
                    fecha: new Date().getTime()
                });
                input.value = "";
            } catch (error) { console.error("No tienes permisos para publicar", error); }
        });

        window.borrarComentario = async (id) => {
            if(confirm("¿Borrar mensaje?")) await deleteDoc(doc(db, "foro", id));
        };

        window.editarComentario = async (id, textoViejo) => {
            const nuevo = prompt("Editar:", textoViejo);
            if(nuevo && nuevo !== textoViejo) await updateDoc(doc(db, "foro", id), { texto: nuevo });
        };
    </script>
</body>
</html>
