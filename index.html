<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenix Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <div id="seccion-auth" class="card">
        <h2 style="margin-top: 0; text-shadow: 0 2px 5px rgba(0,0,0,0.5);">Bienvenido</h2>
        <p style="color: rgba(255,255,255,0.7); margin-bottom: 25px;">Inicia sesión para acceder a la red.</p>
        <button id="btn-google" class="btn-google">
            <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Continuar con Google
        </button>
    </div>

    <div id="seccion-foro">
        <div class="header-foro">
            <div class="info-usuario">Conectado: <span id="user-email"></span></div>
            <div style="display: flex; gap: 10px;">
                <button id="btn-toggle-dashboard" class="btn-secundario" style="display:none;">Abrir Dashboard</button>
                <button class="btn-logout" id="btn-cerrar-sesion">Salir</button>
            </div>
        </div>

        <div id="vista-publica">
            <h2 class="titulo-seccion">Muro de Anuncios</h2>
            <div id="lista-comentarios"></div>
        </div>

        <div id="vista-lectura" style="display: none;">
            <button id="btn-volver-muro">← Volver al muro</button>

            <div class="card-glass" style="max-width: 100%; margin-bottom: 30px;">
                <div id="lectura-meta" style="font-size: 12px; color: #aaa; margin-bottom: 10px;"></div>
                <h1 id="lectura-titulo" style="margin-top: 0; text-align: left; color: #8FBFD6; font-size: 28px;"></h1>
                <p id="lectura-desarrollo" style="color: #ddd; line-height: 1.6; font-size: 16px; margin-top: 20px;"></p>
            </div>

            <div>
                <h3 style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px;">
                    💬 Comentarios de la Iglesia (<span id="contador-comentarios">0</span>)
                </h3>
                
                <div id="lista-comentarios-hilo" style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px;"></div>

                <form id="form-comentar" class="input-comentario-flotante">
                    <input type="hidden" id="tema-actual-id">
                    <input type="text" id="input-nuevo-comentario" placeholder="Añadir un comentario..." required autocomplete="off">
                    <button type="submit">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </form>
            </div>
        </div>

        <div id="vista-dashboard">
            <h2 class="titulo-seccion">Dashboard Administrativo</h2>
            <div class="dashboard-grid">
                <div class="card-glass" style="text-align: center;">
                    <h3 style="margin-top: 0;">Actividad</h3>
                    <div class="stat-numero" id="stat-total">0</div>
                    <p style="margin-bottom: 0; color: #aaa;">Mensajes Activos</p>
                </div>
                <div class="card-glass" style="display: flex; flex-direction: column; justify-content: center;">
                    <h3 style="margin-top: 0; text-align: center;">Acciones Rápidas</h3>
                    <button id="btn-abrir-crear" style="width: 100%; margin-top: 10px;">+ Crear Nuevo Anuncio</button>
                </div>
            </div>
            <h3 style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px;">Gestión de Contenido</h3>
            <div id="lista-admin"></div>
        </div>
    </div>

    <div id="modal-crear" class="modal-overlay">
        <div class="modal-content card-glass">
            <h3 style="margin-top: 0; color: #8FBFD6;">Nuevo tema</h3>
            <form id="form-crear">
                <input type="text" id="input-titulo" placeholder="Tema / Título del anuncio" required autocomplete="off">
                <textarea id="input-desarrollo" rows="5" placeholder="Escribe el desarrollo completo aquí..." required></textarea>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="submit" style="flex: 1;">Publicar</button>
                    <button type="button" class="btn-secundario" id="btn-cancelar-crear" style="flex: 1;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-editar" class="modal-overlay">
        <div class="modal-content card-glass">
            <h3 style="margin-top: 0; color: #4CAF50;">Editar Anuncio</h3>
            <form id="form-editar">
                <input type="hidden" id="edit-id">
                <input type="text" id="edit-titulo" placeholder="Tema / Título" required autocomplete="off">
                <textarea id="edit-desarrollo" rows="5" placeholder="Desarrollo..." required></textarea>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="submit" class="btn-editar" style="flex: 1;">Actualizar</button>
                    <button type="button" class="btn-secundario" id="btn-cancelar-editar" style="flex: 1;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
